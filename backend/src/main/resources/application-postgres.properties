# ===========================
# PostgreSQL Production Config
# Rename to application.properties to use PostgreSQL instead of H2
# ===========================
spring.application.name=rbac-auth-system

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/rbacdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:8080}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
