# ===========================
# Application Configuration
# ===========================
spring.application.name=rbac-auth-system

# ===========================
# Database Configuration
# Use H2 for quick local dev; swap to PostgreSQL in production
# ===========================
spring.datasource.url=jdbc:h2:mem:rbacdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# ===========================
# Server Configuration
# ===========================
server.port=8080

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===========================
# Logging
# ===========================
logging.level.com.rbac=DEBUG
logging.level.org.springframework.security=INFO
